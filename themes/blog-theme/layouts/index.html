{{ define "main" }}
  {{ .Content }}

  {{ $pages := where site.RegularPages "Type" "in" site.Params.mainSections }}
  {{ if $pages }}
  <h2>最新文章</h2>
  <ul class="dynamic-list">
    {{ range $pages.ByTitle }}
    <li>
      <a href="{{ .RelPermalink }}">
        <span class="list-title">{{ .Title }}</span>
        {{ with .Params.description }}
        <span class="list-desc">{{ . }}</span>
        {{ end }}
      </a>
    </li>
    {{ end }}
  </ul>
  {{ end }}
{{ end }}
